spring:
  application:
    name: clients
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
springdoc:
  api-docs:
    path: api-docs
api:
  server:
    url: http://localhost:8080

